name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (offline-safe, no external API calls)
        # backend/test_formula_engine.py 만 실행
        # (test_lookup.py 는 KOSIS API 호출이라 CI에서 제외)
        run: python -m pytest backend/test_formula_engine.py -v
